version: 2

models:
  - name: stg_clickstream
    description: >
      raw_clickstream source를 기반으로 생성된 staging 모델.
      날짜 생성, 컬럼명 정리, 코드 값의 의미 변환을 수행하여
      분석 가능한 형태로 정리된 이벤트 단위 데이터이다.

    columns:
      - name: event_date
        description: 이벤트 발생 일자 (year, month, day를 결합하여 생성)
        tests:
          - not_null

      - name: session_id
        description: 사용자 방문을 구분하는 세션 ID
        tests:
          - not_null

      - name: event_order
        description: 세션 내 클릭 순서 (사용자 행동 흐름을 나타냄)
        tests:
          - not_null

      - name: country
        description: 사용자 접속 국가 (IP 기반)

      - name: product_id
        description: 상품 식별자 (원본 clothing model 코드)

      - name: category
        description: 상품 메인 카테고리 (trousers, skirts, blouses, sale)

      - name: color
        description: 상품 색상 (코드값을 실제 색상명으로 변환)

      - name: location
        description: 웹페이지 내 상품 위치 (UI 영역)

      - name: photography_type
        description: 상품 이미지 촬영 방식 (front, profile)

      - name: price
        description: 상품 가격 (USD)

      - name: price_segment
        description: 카테고리 평균 대비 가격 수준 (high, low)

      - name: page_number
        description: 웹사이트 내 페이지 번호 (1~5)