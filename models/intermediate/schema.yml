version: 2

models:

  - name: int_events_enriched
    description: >
      Staging 데이터를 기반으로 이벤트 단위에서 정제, 중복 제거, 코드 값 변환을 수행한 모델.
      이벤트 단위의 고유 식별자(event_id)를 생성하고, 분석 가능한 형태로 표준화된
      기준 이벤트 테이블이다. 모든 downstream 모델의 기반이 되는 데이터이다.

    columns:
      - name: event_id
        description: 이벤트 단위 surrogate key (session_id + event_order 기반)
        tests:
          - not_null
          - unique

      - name: session_id
        description: 사용자 세션 식별자
        tests:
          - not_null

      - name: event_order
        description: 세션 내 이벤트 발생 순서
        tests:
          - not_null

      - name: event_date
        description: 이벤트 발생 일자 (year, month, day 결합)
        tests:
          - not_null

      - name: product_id
        description: 상품 식별자

      - name: country
        description: 사용자 접속 국가 (lookup 테이블 기반 변환)

      - name: category
        description: 상품 카테고리 (macro 기반 변환)

      - name: color
        description: 상품 색상 (macro 기반 변환)

      - name: location
        description: 페이지 내 상품 위치

      - name: photography_type
        description: 상품 이미지 촬영 방식

      - name: price
        description: 상품 가격 (NULL → 0으로 보정)

      - name: price_segment
        description: 카테고리 평균 대비 가격 수준

      - name: page_number
        description: 웹사이트 내 페이지 번호


  - name: int_sessions
    description: >
      이벤트 데이터를 세션 단위로 집계한 모델.
      세션 시작/종료 시점, 체류 시간, 이벤트 수, 탐색 범위를 계산하여
      사용자 행동을 세션 단위로 분석할 수 있도록 구성된 테이블이다.

    columns:
      - name: session_id
        description: 세션 식별자
        tests:
          - not_null
          - unique

      - name: session_start_time
        description: 세션 시작 시점 (최초 이벤트 날짜)

      - name: session_end_time
        description: 세션 종료 시점 (마지막 이벤트 날짜)

      - name: session_duration
        description: 세션 지속 시간 (초 단위)

      - name: event_count
        description: 세션 내 이벤트 수

      - name: unique_products
        description: 세션 내 조회한 서로 다른 상품 수

      - name: max_page
        description: 세션 내 최대 도달 페이지


  - name: int_session_funnel
    description: >
      세션 단위에서 페이지 이동 경로를 퍼널 형태로 재구성한 모델.
      각 단계별 방문 여부를 0/1로 표현하고, 최종 도달 페이지를 함께 제공하여
      사용자 이탈 구간과 전환 흐름을 분석할 수 있도록 한다.

    columns:
      - name: session_id
        description: 세션 식별자
        tests:
          - not_null
          - unique

      - name: step_1
        description: page 1 방문 여부 (0/1)

      - name: step_2
        description: page 2 방문 여부 (0/1)

      - name: step_3
        description: page 3 방문 여부 (0/1)

      - name: step_4
        description: page 4 방문 여부 (0/1)

      - name: step_5
        description: page 5 방문 여부 (0/1)

      - name: max_page_reached
        description: 세션에서 도달한 최대 페이지


  - name: int_product_performance
    description: >
      이벤트 데이터를 기반으로 상품 단위 성과를 집계한 모델.
      상품별 조회수와 평균 가격을 계산하고, 카테고리 정보를 함께 제공하여
      상품 성과 분석 및 비교에 활용된다.

    columns:
      - name: product_id
        description: 상품 식별자
        tests:
          - not_null
          - unique

      - name: total_views
        description: 상품 조회수 (이벤트 수 기준)

      - name: avg_price
        description: 상품 평균 가격

      - name: category
        description: 상품 카테고리 (any_value로 안정화)